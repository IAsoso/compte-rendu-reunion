<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia — Nouvelle réunion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icone-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="style.css?v=20260706">
  <script src="config.js?v=20260706"></script>
  <script src="auth.js?v=20260706"></script>
  <!-- Page protégée : sans jeton valide, on redirige vers la connexion. -->
  <script>exigerAuth();</script>
  <script src="nav.js?v=20260706" defer></script>
</head>
<body class="page-record">
  <header data-nav></header>

  <main class="scene">
    <div class="enregistreur">
      <p class="etat-label rise" id="etatLabel">Prêt à enregistrer</p>

      <!-- Bouton micro central (bascule enregistrer / stop) -->
      <button id="btnMicro" class="btn-micro rise d1" aria-label="Démarrer l'enregistrement">
        <!-- icône micro -->
        <svg class="icone-micro" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
        <!-- icône stop -->
        <svg class="icone-stop" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="3"></rect>
        </svg>
      </button>

      <!-- Waveform (visible pendant l'enregistrement) -->
      <div class="waveform cache" id="waveform" aria-hidden="true"></div>

      <!-- Chrono -->
      <p class="timer cache" id="timer">00:00</p>

      <!-- Sous-texte d'aide -->
      <p class="sous-texte rise d2" id="sousTexte">Cliquez sur le micro pour démarrer</p>

      <!-- Réglages discrets -->
      <div class="reglages rise d3" id="reglages">
        <div class="reglage">
          <label for="typeReunion">Type de réunion</label>
          <select id="typeReunion">
            <option value="réunion d'équipe">Réunion d'équipe</option>
            <option value="réunion client">Réunion client</option>
            <option value="réunion de projet">Réunion de projet</option>
            <option value="point rapide">Point rapide</option>
            <option value="réunion générale">Autre / Générale</option>
          </select>
        </div>
        <div class="reglage">
          <label for="format">Format</label>
          <select id="format">
            <option value="concis">Concis (l'essentiel)</option>
            <option value="détaillé">Détaillé (complet)</option>
          </select>
        </div>
        <div class="reglage">
          <label for="langue">Langue de l'audio</label>
          <select id="langue">
            <option value="">Automatique (détection)</option>
            <option value="fr">Français</option>
            <option value="en">Anglais</option>
            <option value="es">Espagnol</option>
            <option value="de">Allemand</option>
            <option value="it">Italien</option>
            <option value="pt">Portugais</option>
            <option value="nl">Néerlandais</option>
            <option value="ar">Arabe</option>
            <option value="ja">Japonais</option>
            <option value="zh">Chinois</option>
          </select>
        </div>
      </div>
    </div>
  </main>

  <!-- Overlay de chargement (après Stop, pendant le traitement backend) -->
  <div class="overlay-chargement cache" id="overlayChargement">
    <div class="ondes-chargement">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <p class="texte-chargement" id="texteChargement">Analyse de votre réunion en cours…</p>
    <div class="barre-progression">
      <div class="barre-remplissage" id="barreRemplissage"></div>
    </div>
    <p class="pourcentage" id="pourcentageTexte">0 %</p>
    <p class="sous-chargement">Les longues réunions sont découpées, puis résumées partie par partie.</p>
    <p class="erreur-chargement cache" id="erreurChargement"></p>
    <a href="tarifs.html" class="cta cache" id="erreurCtaTarifs" style="margin-top: 6px;">Voir les offres →</a>
  </div>

  <script>
    // ---- Pré-remplissage des réglages avec les préférences de l'utilisateur ----
    (async () => {
      try {
        const reponse = await fetchAuth(API_BASE_URL + "/preferences");
        const prefs = await reponse.json();
        document.getElementById("typeReunion").value = prefs.type_reunion;
        document.getElementById("format").value = prefs.format;
      } catch (erreur) {
        // Échec silencieux : on garde simplement les valeurs par défaut des select.
      }
    })();

    // ---- Éléments ----
    const btnMicro = document.getElementById("btnMicro");
    const etatLabel = document.getElementById("etatLabel");
    const sousTexte = document.getElementById("sousTexte");
    const reglages = document.getElementById("reglages");
    const waveform = document.getElementById("waveform");
    const timerEl = document.getElementById("timer");
    const overlay = document.getElementById("overlayChargement");
    const erreurChargement = document.getElementById("erreurChargement");
    const texteChargement = document.getElementById("texteChargement");
    const barreRemplissage = document.getElementById("barreRemplissage");
    const pourcentageTexte = document.getElementById("pourcentageTexte");

    // ---- État / variables ----
    let etat = "idle"; // idle | recording
    let mediaRecorder;
    let morceauxAudio = [];
    let flux;

    // Waveform réactive (Web Audio)
    let audioCtx, analyser, rafId;
    const NB_BARRES = 32;
    const barres = [];

    // On génère les barres de la waveform une fois
    for (let i = 0; i < NB_BARRES; i++) {
      const b = document.createElement("span");
      b.className = "barre";
      b.style.setProperty("--i", i);
      waveform.appendChild(b);
      barres.push(b);
    }

    // Chrono
    let secondes = 0, timerInterval;

    // ---- Clic sur le micro : bascule ----
    btnMicro.onclick = function () {
      if (etat === "idle") demarrerEnregistrement();
      else if (etat === "recording") arreterEnregistrement();
    };

    // ---- Démarrer (logique MediaRecorder inchangée) ----
    async function demarrerEnregistrement() {
      flux = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(flux);
      morceauxAudio = [];

      mediaRecorder.ondataavailable = (event) => morceauxAudio.push(event.data);

      mediaRecorder.onstop = async function () {
        const blobAudio = new Blob(morceauxAudio, { type: "audio/webm" });
        passerEnChargement();
        await envoyerAuBackend(blobAudio);
      };

      mediaRecorder.start();
      demarrerWaveform();
      demarrerTimer();
      passerEnEnregistrement();
    }

    // ---- Arrêter ----
    function arreterEnregistrement() {
      mediaRecorder.stop();               // déclenche onstop -> envoyerAuBackend
      flux.getTracks().forEach((t) => t.stop());
      arreterWaveform();
      arreterTimer();
    }

    // ---- Envoi au backend en mode ASYNCHRONE + suivi de progression ----
    async function envoyerAuBackend(blobAudio) {
      const typeReunion = document.getElementById("typeReunion").value;
      const format = document.getElementById("format").value;

      const donnees = new FormData();
      donnees.append("fichier", blobAudio, "enregistrement.webm");
      donnees.append("type_reunion", typeReunion);
      donnees.append("format", format);
      const langue = document.getElementById("langue").value;
      if (langue) donnees.append("langue", langue);  // vide = détection auto

      try {
        // 1. On lance le traitement : le backend répond aussitôt avec un job_id
        const reponse = await fetchAuth(API_BASE_URL + "/transcrire-async", {
          method: "POST",
          body: donnees,
        });
        const donneesJob = await reponse.json();

        // Quota mensuel dépassé (402) : on bloque avec un message clair, pas
        // d'appel Groq/Gemini n'a été fait côté serveur dans ce cas.
        if (reponse.status === 402) {
          afficherBlocageQuota(donneesJob.detail);
          return;
        }
        if (!reponse.ok) {
          afficherErreurChargement(donneesJob.detail || "Le serveur a refusé la demande.");
          return;
        }

        // 2. On suit la progression jusqu'à la fin
        suivreProgression(donneesJob.job_id, typeReunion, format);
      } catch (erreur) {
        afficherErreurChargement(erreur);
      }
    }

    // ---- Estimation du temps restant, basée sur la vitesse observée ----
    // On garde les premiers/derniers relevés (instant, %) et on extrapole.
    let etaDebut = null;
    function estimerRestant(pourcentage) {
      const maintenant = Date.now();
      if (etaDebut === null || pourcentage <= 0) {
        etaDebut = { t: maintenant, p: pourcentage };
        return "";
      }
      const progression = pourcentage - etaDebut.p;
      if (progression < 3) return "";           // pas assez de recul pour estimer
      const msParPoint = (maintenant - etaDebut.t) / progression;
      const restantS = Math.round((100 - pourcentage) * msParPoint / 1000);
      if (restantS < 10) return "quelques secondes restantes";
      if (restantS < 90) return `~${Math.max(10, Math.round(restantS / 10) * 10)} s restantes`;
      return `~${Math.round(restantS / 60)} min restantes`;
    }

    // ---- Interrogation régulière de la progression (toutes les ~1 s) ----
    function suivreProgression(jobId, typeReunion, format) {
      etaDebut = null;
      const sonder = async function () {
        try {
          const reponse = await fetchAuth(API_BASE_URL + "/progression/" + jobId);
          const p = await reponse.json();

          if (p.statut === "termine") {
            majBarre(100, p.message || "Compte-rendu prêt !");
            const r = p.resultat || {};
            const donneesResultat = {
              id: r.id,   // permet l'envoi par email et le rechargement ?id=
              texte_brut: r.texte_brut || "",
              texte: r.texte || "",
              compte_rendu: r.compte_rendu || "",
              actions: r.actions || [],
              type_reunion: typeReunion,
              format: format,
              date: new Date().toISOString(),
            };
            sessionStorage.setItem("synthia_resultat", JSON.stringify(donneesResultat));
            window.location.href = "resultat.html";
            return;
          }

          if (p.statut === "erreur" || p.statut === "inconnu") {
            afficherErreurChargement(p.erreur || "Traitement interrompu.");
            return;
          }

          // Toujours en cours : on met à jour la barre et on re-sonde
          majBarre(p.pourcentage || 0, p.message || "Traitement en cours…");
          setTimeout(sonder, 1000);
        } catch (erreur) {
          afficherErreurChargement(erreur);
        }
      };
      sonder();
    }

    // ---- Mise à jour visuelle de la barre + du message ----
    function majBarre(pourcentage, message) {
      barreRemplissage.style.width = pourcentage + "%";
      const restant = pourcentage > 0 && pourcentage < 100 ? estimerRestant(pourcentage) : "";
      pourcentageTexte.textContent = pourcentage + " %" + (restant ? "  ·  " + restant : "");
      texteChargement.textContent = message;
    }

    function afficherErreurChargement(erreur) {
      const estTexte = typeof erreur === "string";
      erreurChargement.textContent = estTexte
        ? "❌ " + erreur
        : "❌ Nous n'avons pas pu traiter votre réunion. Vérifiez votre connexion internet, puis réessayez.";
      erreurChargement.classList.remove("cache");
      console.error(erreur);
    }

    // Cas spécifique : quota mensuel atteint (402). On affiche le message du
    // backend + un lien direct vers les offres, sans jargon technique.
    function afficherBlocageQuota(detail) {
      erreurChargement.textContent = "🔒 " + (detail || "Quota mensuel atteint.");
      erreurChargement.classList.remove("cache");
      document.getElementById("erreurCtaTarifs").classList.remove("cache");
    }

    // ================= États visuels =================
    const TITRE_NORMAL = document.title;

    function passerEnEnregistrement() {
      etat = "recording";
      btnMicro.classList.add("enregistre");
      btnMicro.setAttribute("aria-label", "Arrêter l'enregistrement");
      etatLabel.textContent = "Enregistrement en cours";
      sousTexte.textContent = "Cliquez à nouveau (ou appuyez sur Espace) pour terminer";
      reglages.classList.add("cache");
      waveform.classList.remove("cache");
      timerEl.classList.remove("cache");
      // Indicateur dans l'onglet : on garde le fil même en changeant de fenêtre.
      document.title = "🔴 Enregistrement — Synthia";
    }

    function passerEnChargement() {
      etat = "processing";
      overlay.classList.remove("cache");
      document.title = TITRE_NORMAL;
    }

    // ---- Raccourci clavier : Espace démarre/arrête l'enregistrement ----
    document.addEventListener("keydown", (e) => {
      if (e.code !== "Space") return;
      const cible = e.target;
      // On n'intercepte pas la barre espace dans un champ de saisie.
      if (cible.closest("input, select, textarea, [contenteditable]")) return;
      if (etat !== "idle" && etat !== "recording") return;
      e.preventDefault();
      btnMicro.click();
    });

    // ================= Waveform réactive =================
    function demarrerWaveform() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(flux);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64; // 32 bandes de fréquences
        source.connect(analyser);

        const donnees = new Uint8Array(analyser.frequencyBinCount);
        const animer = function () {
          rafId = requestAnimationFrame(animer);
          analyser.getByteFrequencyData(donnees);
          for (let i = 0; i < barres.length; i++) {
            const v = donnees[i] / 255;
            barres[i].style.transform = "scaleY(" + Math.max(0.08, v) + ")";
          }
        };
        animer();
      } catch (e) {
        // Repli : animation CSS si Web Audio indisponible
        waveform.classList.add("anime-css");
      }
    }

    function arreterWaveform() {
      if (rafId) cancelAnimationFrame(rafId);
      if (audioCtx) audioCtx.close();
      waveform.classList.remove("anime-css");
    }

    // ================= Chrono =================
    function demarrerTimer() {
      secondes = 0;
      majTimer();
      timerInterval = setInterval(function () {
        secondes++;
        majTimer();
      }, 1000);
    }
    function arreterTimer() {
      clearInterval(timerInterval);
    }
    function majTimer() {
      const m = String(Math.floor(secondes / 60)).padStart(2, "0");
      const s = String(secondes % 60).padStart(2, "0");
      timerEl.textContent = m + ":" + s;
    }
  </script>
  <footer class="pied" data-pied></footer>
</body>
</html>
