<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compte-rendu de réunion</title>
</head>
<body>
  <h1>Enregistreur de réunion</h1>

  <!-- Les deux boutons. "disabled" sur Stop = grisé au départ -->
  <button id="btnEnregistrer">Enregistrer</button>
  <button id="btnStop" disabled>Stop</button>

  <!-- Le lecteur audio où on réécoutera l'enregistrement -->
  <audio id="lecteur" controls></audio>
  <h2>Transcription :</h2>
  <p id="transcription">(le texte apparaîtra ici après l'enregistrement)</p>

  <!-- Le script : c'est ici que vit toute la logique -->
  <<script>
    const btnEnregistrer = document.getElementById("btnEnregistrer");
    const btnStop = document.getElementById("btnStop");
    const lecteur = document.getElementById("lecteur");

    let mediaRecorder;
    let morceauxAudio = [];

    btnEnregistrer.onclick = async function () {
      const flux = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(flux);
      morceauxAudio = [];

      mediaRecorder.ondataavailable = function (event) {
        morceauxAudio.push(event.data);
      };

      // Quand l'enregistrement s'arrête : on assemble l'audio,
      // on le fait réécouter, ET on l'envoie au backend.
      mediaRecorder.onstop = async function () {
        const blobAudio = new Blob(morceauxAudio, { type: "audio/webm" });
        lecteur.src = URL.createObjectURL(blobAudio);

        // --- Envoi au backend ---
        await envoyerAuBackend(blobAudio);
      };

      mediaRecorder.start();
      btnEnregistrer.disabled = true;
      btnStop.disabled = false;
    };

    btnStop.onclick = function () {
      mediaRecorder.stop();
      btnEnregistrer.disabled = false;
      btnStop.disabled = true;
    };

    // --- La fonction qui envoie l'audio au backend ---
    async function envoyerAuBackend(blobAudio) {
      const donnees = new FormData();
      donnees.append("fichier", blobAudio, "enregistrement.webm");

      // On affiche un message d'attente pendant la transcription
      document.getElementById("transcription").textContent = "Transcription en cours...";

      const reponse = await fetch("http://127.0.0.1:8000/transcrire", {
        method: "POST",
        body: donnees,
      });

      const resultat = await reponse.json();
      console.log("Réponse du backend :", resultat);

      // On affiche le texte transcrit sur la page
      document.getElementById("transcription").textContent = resultat.texte;
    }
  </script>
</body>
</html>
