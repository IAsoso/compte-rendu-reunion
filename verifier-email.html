<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia — Vérification de l'email</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
      <link rel="icon" href="favicon.ico?v=2" sizes="any">
  <link rel="icon" href="favicon-32.png?v=2" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="style.css?v=20260706">
  <script src="config.js?v=20260706"></script>
  <script src="nav.js?v=20260706" defer></script>
</head>
<body class="page-auth">
  <header data-nav></header>

  <main>
    <div class="carte-auth rise" style="text-align: center;">
      <h2 class="auth-titre">Vérification de l'email</h2>
      <p class="auth-sous-titre" id="etat">Vérification en cours…</p>
      <a href="app.html" class="cta btn-auth cache" id="ctaApp">Ouvrir Synthia →</a>
      <p class="auth-message" id="message"></p>
    </div>
  </main>

  <footer class="pied" data-pied></footer>

  <script>
    const etat = document.getElementById("etat");
    const message = document.getElementById("message");
    const jeton = new URLSearchParams(window.location.search).get("jeton") || "";

    (async () => {
      if (!jeton) {
        etat.textContent = "Lien incomplet — utilisez le lien reçu par email.";
        return;
      }
      try {
        const r = await fetch(API_BASE_URL + "/verifier-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ jeton: jeton }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(typeof d.detail === "string" ? d.detail : "Lien invalide ou expiré.");
        etat.textContent = "✅ " + d.message;
        document.getElementById("ctaApp").classList.remove("cache");
      } catch (erreur) {
        etat.textContent = "❌ " + (erreur.message || "Serveur injoignable.");
      }
    })();
  </script>
</body>
</html>
