<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia — Paramètres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icone-192.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <!-- Page protégée : sans jeton valide, on redirige vers la connexion. -->
  <script>exigerAuth();</script>
  <script src="nav.js" defer></script>
</head>
<body class="page-auth">
  <header data-nav></header>

  <main>
    <!-- Abonnement : plan actuel + consommation du mois -->
    <div class="carte-auth rise" id="carteAbonnement" style="margin-bottom: 22px;">
      <h2 class="auth-titre">Abonnement</h2>
      <p class="auth-sous-titre" id="abonnementIntro">Chargement…</p>

      <div class="usage-barre-fond cache" id="usageBarreFond">
        <div class="usage-barre-remplissage" id="usageBarreRemplissage"></div>
      </div>
      <p class="usage-detail cache" id="usageDetail"></p>

      <div class="abonnement-actions">
        <a href="tarifs.html" class="btn-premium">Changer d'offre</a>
        <button class="btn-premium" id="btnGererAbonnement" type="button">Gérer mon abonnement</button>
      </div>
      <p class="auth-message" id="messageAbonnement"></p>
    </div>

    <form class="carte-auth rise" id="formParametres" novalidate>
      <h2 class="auth-titre">Paramètres</h2>
      <p class="auth-sous-titre">Vos préférences par défaut pour chaque nouveau compte-rendu.</p>

      <div class="champ">
        <label for="typeReunion">Type de réunion par défaut</label>
        <select id="typeReunion">
          <option value="réunion d'équipe">Réunion d'équipe</option>
          <option value="réunion client">Réunion client</option>
          <option value="réunion de projet">Réunion de projet</option>
          <option value="point rapide">Point rapide</option>
          <option value="réunion générale">Autre / Générale</option>
        </select>
      </div>
      <div class="champ">
        <label for="format">Format par défaut</label>
        <select id="format">
          <option value="concis">Concis (l'essentiel)</option>
          <option value="détaillé">Détaillé (complet)</option>
        </select>
      </div>

      <button type="submit" class="cta btn-auth" id="btnEnregistrer">Enregistrer</button>
      <p class="auth-message" id="message"></p>
    </form>

    <!-- Zone dangereuse : suppression definitive du compte (RGPD) -->
    <div class="carte-auth carte-danger rise" style="margin-top: 22px;">
      <h2 class="auth-titre">Supprimer mon compte</h2>
      <p class="auth-sous-titre">
        Suppression définitive et immédiate : tous vos comptes-rendus et données seront
        effacés, et tout abonnement en cours sera résilié. Cette action est irréversible.
      </p>
      <button type="button" class="btn-danger" id="btnSupprimerCompte">Supprimer définitivement mon compte</button>
      <p class="auth-message" id="messageSuppression"></p>
    </div>
  </main>

  <script>
    // ---- Abonnement : plan actuel + consommation du mois ----
    const abonnementIntro = document.getElementById("abonnementIntro");
    const usageBarreFond = document.getElementById("usageBarreFond");
    const usageBarreRemplissage = document.getElementById("usageBarreRemplissage");
    const usageDetail = document.getElementById("usageDetail");
    const messageAbonnement = document.getElementById("messageAbonnement");
    const btnGererAbonnement = document.getElementById("btnGererAbonnement");

    // Retour depuis Stripe Checkout après un paiement réussi. Le webhook met
    // à jour le plan de façon asynchrone : il peut y avoir un très court délai
    // avant que /abonnement/statut ne reflète la nouvelle offre.
    if (new URLSearchParams(window.location.search).get("abonnement") === "succes") {
      messageAbonnement.className = "auth-message succes";
      messageAbonnement.textContent = "✅ Paiement confirmé — votre offre est mise à jour (actualisez dans quelques secondes si besoin).";
    }

    (async () => {
      try {
        const reponse = await fetchAuth(API_BASE_URL + "/abonnement/statut");
        if (!reponse.ok) throw new Error();
        const statut = await reponse.json();

        abonnementIntro.textContent = `Offre ${statut.label} — ${statut.minutes_quota} min de réunion incluses par mois.`;

        const pourcentage = Math.min(100, Math.round((statut.minutes_utilisees / statut.minutes_quota) * 100));
        usageBarreRemplissage.style.width = pourcentage + "%";
        usageBarreFond.classList.remove("cache");
        usageDetail.textContent = `${statut.minutes_utilisees} / ${statut.minutes_quota} min utilisées ce mois-ci (${statut.minutes_restantes} min restantes).`;
        usageDetail.classList.remove("cache");

        // Le plan gratuit n'a pas de Customer Stripe : rien à gérer, on invite à changer d'offre.
        if (statut.plan === "gratuit") {
          btnGererAbonnement.textContent = "Passer à une offre payante";
          btnGererAbonnement.addEventListener("click", () => (window.location.href = "tarifs.html"));
        } else {
          btnGererAbonnement.addEventListener("click", async () => {
            btnGererAbonnement.disabled = true;
            btnGererAbonnement.textContent = "Redirection…";
            try {
              const r = await fetchAuth(API_BASE_URL + "/abonnement/portail", { method: "POST" });
              const d = await r.json();
              if (!r.ok) throw new Error(d.detail || "Impossible d'ouvrir la gestion de l'abonnement.");
              window.location.href = d.url;
            } catch (erreur) {
              messageAbonnement.className = "auth-message erreur";
              messageAbonnement.textContent = erreur.message || "Serveur injoignable.";
              btnGererAbonnement.disabled = false;
              btnGererAbonnement.textContent = "Gérer mon abonnement";
            }
          });
        }
      } catch (erreur) {
        abonnementIntro.textContent = "Impossible de charger votre abonnement.";
      }
    })();

    const form = document.getElementById("formParametres");
    const bouton = document.getElementById("btnEnregistrer");
    const message = document.getElementById("message");
    const selType = document.getElementById("typeReunion");
    const selFormat = document.getElementById("format");

    // Chargement des préférences actuelles.
    (async () => {
      try {
        const reponse = await fetchAuth(API_BASE_URL + "/preferences");
        const prefs = await reponse.json();
        selType.value = prefs.type_reunion;
        selFormat.value = prefs.format;
      } catch (erreur) {
        message.className = "auth-message erreur";
        message.textContent = "Impossible de charger vos préférences.";
      }
    })();

    // ---- Suppression de compte (double confirmation) ----
    const btnSupprimer = document.getElementById("btnSupprimerCompte");
    const messageSuppression = document.getElementById("messageSuppression");
    btnSupprimer.addEventListener("click", async () => {
      const saisie = prompt(
        "Cette action est IRRÉVERSIBLE : comptes-rendus effacés, abonnement résilié.\n\n" +
        "Pour confirmer, tapez : SUPPRIMER"
      );
      if (saisie === null) return;                 // annulé
      if (saisie.trim().toUpperCase() !== "SUPPRIMER") {
        messageSuppression.className = "auth-message erreur";
        messageSuppression.textContent = "Confirmation incorrecte — compte conservé.";
        return;
      }
      btnSupprimer.disabled = true;
      btnSupprimer.textContent = "Suppression…";
      try {
        const r = await fetchAuth(API_BASE_URL + "/compte", { method: "DELETE" });
        const d = await r.json();
        if (!r.ok) throw new Error(d.detail || "Échec de la suppression.");
        localStorage.removeItem("synthia_token");
        sessionStorage.clear();
        window.location.href = "index.html";
      } catch (erreur) {
        messageSuppression.className = "auth-message erreur";
        messageSuppression.textContent = erreur.message || "Serveur injoignable.";
        btnSupprimer.disabled = false;
        btnSupprimer.textContent = "Supprimer définitivement mon compte";
      }
    });

    // Enregistrement.
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.className = "auth-message";
      message.textContent = "";
      bouton.disabled = true;
      bouton.textContent = "Enregistrement…";
      try {
        const reponse = await fetchAuth(API_BASE_URL + "/preferences", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type_reunion: selType.value, format: selFormat.value }),
        });
        if (!reponse.ok) throw new Error("Échec de l'enregistrement.");
        message.className = "auth-message succes";
        message.textContent = "✅ Préférences enregistrées.";
      } catch (erreur) {
        message.className = "auth-message erreur";
        message.textContent = erreur.message || "Serveur injoignable.";
      } finally {
        bouton.disabled = false;
        bouton.textContent = "Enregistrer";
      }
    });
  </script>
  <footer class="pied" data-pied></footer>
</body>
</html>
