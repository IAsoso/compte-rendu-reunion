<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthia — Historique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <!-- Page protégée : sans jeton valide, on redirige vers la connexion. -->
  <script>exigerAuth();</script>
  <script src="nav.js" defer></script>
</head>
<body class="page-app page-historique">
  <header data-nav></header>

  <main class="doc">
    <div class="histo-entete">
      <h2 class="doc-titre">Historique des comptes-rendus</h2>
      <p class="doc-meta" id="histoSousTitre">Chargement…</p>
    </div>

    <!-- Recherche -->
    <input type="search" id="recherche" class="histo-recherche" aria-label="Rechercher un compte-rendu"
           placeholder="🔍 Rechercher (type, date, contenu)…" autocomplete="off">

    <!-- Filtres avancés -->
    <div class="histo-filtres">
      <select id="filtreType" aria-label="Filtrer par type de réunion">
        <option value="">Tous les types</option>
        <option value="réunion d'équipe">Réunion d'équipe</option>
        <option value="réunion client">Réunion client</option>
        <option value="réunion de projet">Réunion de projet</option>
        <option value="point rapide">Point rapide</option>
        <option value="réunion générale">Autre / Générale</option>
      </select>
      <label class="histo-filtre-date">Du <input type="date" id="filtreDu" aria-label="Date de début"></label>
      <label class="histo-filtre-date">Au <input type="date" id="filtreAu" aria-label="Date de fin"></label>
      <button type="button" id="filtreReset" class="btn-premium cache">Effacer les filtres</button>
    </div>

    <!-- Liste -->
    <div id="liste" class="histo-liste"></div>

    <!-- Pagination : au-delà de 50 entrées -->
    <div class="histo-charger-plus cache" id="blocChargerPlus">
      <button type="button" class="btn-premium" id="btnChargerPlus">Afficher plus de comptes-rendus</button>
    </div>

    <!-- État vide -->
    <div id="etatVide" class="etat-vide cache">
      <div class="etat-vide-icone">🗂️</div>
      <h2>Aucun compte-rendu enregistré</h2>
      <p>Vos comptes-rendus apparaîtront ici après votre première réunion.</p>
      <a href="app.html" class="cta">🎙️ Créer un compte-rendu</a>
    </div>

    <!-- État erreur -->
    <div id="etatErreur" class="etat-vide cache">
      <div class="etat-vide-icone">⚠️</div>
      <h2>Impossible de charger l'historique</h2>
      <p>Vérifiez votre connexion internet, puis actualisez la page.</p>
    </div>
  </main>

  <script>
    const API = window.API_BASE_URL;
    // Toutes les requêtes ci-dessous passent par fetchAuth (voir auth.js) :
    // le jeton est joint automatiquement et un 401 déconnecte l'utilisateur.
    const liste = document.getElementById("liste");
    const sousTitre = document.getElementById("histoSousTitre");
    const etatVide = document.getElementById("etatVide");
    const etatErreur = document.getElementById("etatErreur");

    // Format de date lisible en français
    function formaterDate(iso) {
      const dt = new Date(iso);
      if (isNaN(dt)) return iso || "";
      return dt.toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" }) +
        " à " + dt.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    }

    function capitaliser(txt) {
      return txt ? txt.charAt(0).toUpperCase() + txt.slice(1) : "Réunion";
    }

    // Échappement HTML : type_reunion/format viennent de l'API et peuvent
    // contenir n'importe quelle chaîne (le backend n'impose pas les valeurs
    // du select) — sans échappement, un compte-rendu piégé serait un XSS stocké.
    function echap(txt) {
      const d = document.createElement("div");
      d.textContent = txt == null ? "" : String(txt);
      return d.innerHTML;
    }

    const recherche = document.getElementById("recherche");
    const filtreType = document.getElementById("filtreType");
    const filtreDu = document.getElementById("filtreDu");
    const filtreAu = document.getElementById("filtreAu");
    const filtreReset = document.getElementById("filtreReset");
    const blocChargerPlus = document.getElementById("blocChargerPlus");
    const btnChargerPlus = document.getElementById("btnChargerPlus");

    // Pagination côté client : on affiche par tranches de 50.
    const PAGE_TAILLE = 50;
    let comptesCharges = [];   // résultats complets de la dernière requête
    let nbAffiches = 0;

    // Jeton de séquence : seule la requête la plus récente met à jour l'affichage
    // (évite qu'un chargement lent antérieur n'écrase un résultat plus récent).
    let sequenceRecherche = 0;

    function filtresActifs() {
      return !!(recherche.value.trim() || filtreType.value || filtreDu.value || filtreAu.value);
    }

    function afficherTranche() {
      const tranche = comptesCharges.slice(nbAffiches, nbAffiches + PAGE_TAILLE);
      tranche.forEach((cr) => {
        const item = document.createElement("button");
        item.className = "histo-item";
        item.innerHTML = `
          <span class="histo-icone">📄</span>
          <span class="histo-infos">
            <span class="histo-type">${echap(capitaliser(cr.type_reunion))}</span>
            <span class="histo-date">${echap(formaterDate(cr.date_creation))}${cr.format ? "  ·  " + echap(cr.format) : ""}</span>
          </span>
          <span class="histo-fleche" aria-hidden="true">→</span>
        `;
        item.onclick = () => ouvrirCompteRendu(cr.id);
        liste.appendChild(item);
      });
      nbAffiches += tranche.length;
      blocChargerPlus.classList.toggle("cache", nbAffiches >= comptesCharges.length);
    }

    btnChargerPlus.onclick = afficherTranche;

    // Chargement de la liste (recherche + filtres avancés)
    async function chargerHistorique() {
      const monTour = ++sequenceRecherche;
      // On repart d'un état propre à chaque appel (recherche relancée).
      liste.innerHTML = "";
      nbAffiches = 0;
      etatVide.classList.add("cache");
      etatErreur.classList.add("cache");
      blocChargerPlus.classList.add("cache");
      filtreReset.classList.toggle("cache", !filtresActifs());
      try {
        const params = new URLSearchParams();
        const q = recherche.value.trim();
        if (q) params.set("q", q);
        if (filtreType.value) params.set("type", filtreType.value);
        if (filtreDu.value) params.set("du", filtreDu.value);
        if (filtreAu.value) params.set("au", filtreAu.value);
        const suffixe = params.toString() ? "?" + params.toString() : "";

        const reponse = await fetchAuth(API + "/historique" + suffixe);
        const comptes = await reponse.json();
        if (monTour !== sequenceRecherche) return;  // une recherche plus récente a pris le relais

        if (!Array.isArray(comptes) || comptes.length === 0) {
          // Aucun résultat : message contextuel selon qu'on filtre ou non.
          sousTitre.textContent = filtresActifs() ? "Aucun résultat avec ces critères" : "";
          if (!filtresActifs()) etatVide.classList.remove("cache");
          return;
        }

        sousTitre.textContent =
          comptes.length + (comptes.length > 1 ? " comptes-rendus" : " compte-rendu") +
          (filtresActifs() ? " trouvé" + (comptes.length > 1 ? "s" : "") : " enregistré" + (comptes.length > 1 ? "s" : ""));

        comptesCharges = comptes;
        afficherTranche();
      } catch (erreur) {
        if (monTour !== sequenceRecherche) return;  // réponse obsolète, on ignore
        sousTitre.textContent = "";
        etatErreur.classList.remove("cache");
        console.error(erreur);
      }
    }

    // Filtres avancés : rechargement immédiat au changement
    [filtreType, filtreDu, filtreAu].forEach((el) =>
      el.addEventListener("change", () => chargerHistorique())
    );
    filtreReset.onclick = () => {
      recherche.value = "";
      filtreType.value = "";
      filtreDu.value = "";
      filtreAu.value = "";
      chargerHistorique();
    };

    // Ouverture d'un compte-rendu : on le recharge puis on redirige vers resultat.html
    async function ouvrirCompteRendu(id) {
      try {
        const reponse = await fetchAuth(API + "/compte-rendu/" + id);
        if (!reponse.ok) throw new Error("introuvable");
        const cr = await reponse.json();

        const donneesResultat = {
          id: cr.id,
          texte: cr.transcription || "",
          compte_rendu: cr.compte_rendu || "",
          actions: cr.actions || [],
          type_reunion: cr.type_reunion || "",
          format: cr.format || "",
          date: cr.date_creation || "",
        };
        sessionStorage.setItem("synthia_resultat", JSON.stringify(donneesResultat));
        window.location.href = "resultat.html";
      } catch (erreur) {
        alert("Impossible d'ouvrir ce compte-rendu.");
        console.error(erreur);
      }
    }

    // Recherche : relance la requête après une courte pause (anti-spam serveur).
    let minuteur = null;
    recherche.addEventListener("input", () => {
      clearTimeout(minuteur);
      minuteur = setTimeout(() => chargerHistorique(), 300);
    });

    chargerHistorique();
  </script>
  <footer class="pied" data-pied></footer>
</body>
</html>
